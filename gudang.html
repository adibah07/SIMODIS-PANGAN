<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Gudang - SIMODIS-Pangan Terpadu</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header Bar -->
            <div id="header-placeholder"></div>

            <!-- Content Body -->
            <div class="content-body">
                <!-- Page Title Block -->
                <div class="page-title-block">
                    <div>
                        <h2 class="page-title">Data Gudang</h2>
                        <div class="page-breadcrumbs">
                            <span>SIMODIS-Pangan</span>
                            <i class="fas fa-chevron-right breadcrumb-separator"></i>
                            <span style="color: var(--primary-light); font-weight: 500;">Kelola Gudang Penyimpanan</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        <span>Tambah Gudang</span>
                    </button>
                </div>

                <!-- Table Filter & Search bar -->
                <div class="table-filter-bar">
                    <div class="filter-left">
                        <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted);">Tampilkan:</span>
                        <select class="filter-select" id="page-size-select" onchange="changePageSize()">
                            <option value="5">5 Data</option>
                            <option value="10" selected>10 Data</option>
                            <option value="20">20 Data</option>
                        </select>
                    </div>
                    <div style="position: relative; max-width: 280px; width: 100%;">
                        <i class="fas fa-search" style="position: absolute; left: 12px; top: 12px; color: var(--text-muted); font-size: 0.85rem;"></i>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="local-search-input" 
                            placeholder="Cari nama gudang..." 
                            style="padding-left: 36px; padding-top: 8px; padding-bottom: 8px;"
                            onkeyup="handleSearch()"
                        >
                    </div>
                </div>

                <!-- Table Modern CRUD -->
                <div class="table-responsive">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th style="width: 60px;">No</th>
                                <th>Nama Gudang</th>
                                <th>Wilayah</th>
                                <th>Lokasi / Alamat</th>
                                <th>Kapasitas (Ton)</th>
                                <th>Total Stok (Ton)</th>
                                <th style="width: 120px; text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="gudang-table-body">
                            <!-- Populated dynamically via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="table-footer">
                    <div class="pagination-info" id="pagination-info-text">
                        Menampilkan 0-0 dari 0 data
                    </div>
                    <div class="pagination-controls" id="pagination-buttons">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL ADD / EDIT FORM -->
    <div class="modal-overlay" id="gudang-modal">
        <div class="modal-card" style="max-width: 580px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Tambah Data Gudang</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="gudang-form" onsubmit="saveData(event)">
                <input type="hidden" id="gudang-id">
                <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                    
                    <h4 style="font-size: 0.9rem; font-weight: 600; color: var(--primary-light); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">Informasi Gudang</h4>
                    
                    <!-- Nama Gudang -->
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label for="input-nama" class="form-label">Nama Gudang</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-warehouse" style="left: 12px;"></i>
                            <input type="text" id="input-nama" class="form-control" style="padding-left: 34px;" placeholder="Contoh: Gudang Sukmajaya Utama" required>
                        </div>
                    </div>

                    <!-- Wilayah (Dropdown) -->
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label for="select-wilayah" class="form-label">Wilayah Penempatan</label>
                        <select id="select-wilayah" class="filter-select" style="width: 100%; padding: 10px;" required>
                            <option value="">-- Pilih Wilayah --</option>
                            <!-- Placed dynamically via JS -->
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <!-- Kapasitas -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-kapasitas" class="form-label">Kapasitas Maksimal (Ton)</label>
                            <div class="input-icon-wrapper">
                                <i class="fas fa-weight-hanging" style="left: 12px;"></i>
                                <input type="number" id="input-kapasitas" class="form-control" style="padding-left: 34px;" placeholder="Contoh: 150" min="10" required>
                            </div>
                        </div>

                        <!-- Lokasi / Alamat -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-lokasi" class="form-label">Alamat / Lokasi</label>
                            <div class="input-icon-wrapper">
                                <i class="fas fa-map-marked" style="left: 12px;"></i>
                                <input type="text" id="input-lokasi" class="form-control" style="padding-left: 34px;" placeholder="Contoh: Jl. Raya Bogor KM. 31" required>
                            </div>
                        </div>
                    </div>

                    <h4 style="font-size: 0.9rem; font-weight: 600; color: var(--primary-light); margin-top: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">Detail Stok Komoditas saat ini</h4>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <!-- Beras -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-stok-beras" class="form-label">Stok Beras (Ton)</label>
                            <input type="number" id="input-stok-beras" class="form-control" style="padding-left: 12px;" placeholder="Beras (Ton)" min="0" required>
                        </div>
                        
                        <!-- Gula -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-stok-gula" class="form-label">Stok Gula (Ton)</label>
                            <input type="number" id="input-stok-gula" class="form-control" style="padding-left: 12px;" placeholder="Gula (Ton)" min="0" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <!-- Minyak Goreng -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-stok-minyak" class="form-label">Stok Minyak Goreng (Liter)</label>
                            <input type="number" id="input-stok-minyak" class="form-control" style="padding-left: 12px;" placeholder="Minyak (Liter)" min="0" required>
                        </div>
                        
                        <!-- Tepung -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-stok-tepung" class="form-label">Stok Tepung (Ton)</label>
                            <input type="number" id="input-stok-tepung" class="form-control" style="padding-left: 12px;" placeholder="Tepung (Ton)" min="0" required>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core App Logic -->
    <script src="assets/js/app.js"></script>
    <!-- Gudang controller -->
    <script src="assets/js/gudang.js"></script>
</body>
</html>
