<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribusi Pangan - SIMODIS-Pangan Terpadu</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header Bar -->
            <div id="header-placeholder"></div>

            <!-- Content Body -->
            <div class="content-body">
                <!-- Page Title Block -->
                <div class="page-title-block">
                    <div>
                        <h2 class="page-title">Distribusi Pangan</h2>
                        <div class="page-breadcrumbs">
                            <span>SIMODIS-Pangan</span>
                            <i class="fas fa-chevron-right breadcrumb-separator"></i>
                            <span style="color: var(--primary-light); font-weight: 500;">Daftar Penyaluran Logistik</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus"></i>
                        <span>Tambah Distribusi</span>
                    </button>
                </div>

                <!-- Table Filter & Search bar -->
                <div class="table-filter-bar">
                    <div class="filter-left">
                        <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted);">Status:</span>
                        <select class="filter-select" id="filter-status-select" onchange="handleFilter()">
                            <option value="">Semua Status</option>
                            <option value="Terkirim">Terkirim</option>
                            <option value="Dalam Perjalanan">Dalam Perjalanan</option>
                            <option value="Terlambat">Terlambat</option>
                        </select>

                        <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-left: 10px;">Tampilkan:</span>
                        <select class="filter-select" id="page-size-select" onchange="changePageSize()">
                            <option value="5">5 Data</option>
                            <option value="10" selected>10 Data</option>
                            <option value="20">20 Data</option>
                        </select>
                    </div>
                    <div style="position: relative; max-width: 280px; width: 100%;">
                        <i class="fas fa-search" style="position: absolute; left: 12px; top: 12px; color: var(--text-muted); font-size: 0.85rem;"></i>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="local-search-input" 
                            placeholder="Cari distribusi..." 
                            style="padding-left: 36px; padding-top: 8px; padding-bottom: 8px;"
                            onkeyup="handleSearch()"
                        >
                    </div>
                </div>

                <!-- Table Modern CRUD -->
                <div class="table-responsive">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th style="width: 60px;">No</th>
                                <th>Tanggal</th>
                                <th>Gudang Asal</th>
                                <th>Tujuan Penyaluran</th>
                                <th>Jenis Pangan</th>
                                <th>Jumlah Jumlah (Kg)</th>
                                <th>Status</th>
                                <th style="width: 120px; text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="distribusi-table-body">
                            <!-- Populated dynamically via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="table-footer">
                    <div class="pagination-info" id="pagination-info-text">
                        Menampilkan 0-0 dari 0 data
                    </div>
                    <div class="pagination-controls" id="pagination-buttons">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL ADD / EDIT FORM -->
    <div class="modal-overlay" id="distribusi-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title-text">Tambah Distribusi Pangan</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="distribusi-form" onsubmit="saveData(event)">
                <input type="hidden" id="distribusi-id">
                <div class="modal-body">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <!-- Tanggal -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-tanggal" class="form-label">Tanggal Distribusi</label>
                            <input type="date" id="input-tanggal" class="form-control" style="padding-left: 14px;" required>
                        </div>

                        <!-- Status -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="select-status" class="form-label">Status</label>
                            <select id="select-status" class="filter-select" style="width: 100%; padding: 10px;" required>
                                <option value="Terkirim">Terkirim</option>
                                <option value="Dalam Perjalanan">Dalam Perjalanan</option>
                                <option value="Terlambat">Terlambat</option>
                            </select>
                        </div>
                    </div>

                    <!-- Gudang Asal (Dropdown) -->
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label for="select-gudang" class="form-label">Gudang Asal</label>
                        <select id="select-gudang" class="filter-select" style="width: 100%; padding: 10px;" onchange="showWarehouseStockInfo()" required>
                            <option value="">-- Pilih Gudang Asal --</option>
                            <!-- Populated via JS -->
                        </select>
                        <!-- Dynamic Stock Label info -->
                        <div id="warehouse-stock-info-label" style="font-size: 0.75rem; color: var(--primary-light); margin-top: 4px; font-weight: 500;"></div>
                    </div>

                    <!-- Tujuan Titik Distribusi (Dropdown) -->
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label for="select-titik" class="form-label">Tujuan (Titik Distribusi)</label>
                        <select id="select-titik" class="filter-select" style="width: 100%; padding: 10px;" required>
                            <option value="">-- Pilih Titik Penerima --</option>
                            <!-- Populated via JS -->
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <!-- Jenis Pangan -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="select-pangan" class="form-label">Jenis Pangan</label>
                            <select id="select-pangan" class="filter-select" style="width: 100%; padding: 10px;" onchange="showWarehouseStockInfo()" required>
                                <option value="Beras">Beras</option>
                                <option value="Gula">Gula</option>
                                <option value="Minyak Goreng">Minyak Goreng</option>
                                <option value="Tepung">Tepung</option>
                            </select>
                        </div>

                        <!-- Jumlah (Kg) -->
                        <div class="form-group" style="margin-bottom: 0.8rem;">
                            <label for="input-jumlah" class="form-label">Jumlah Jumlah (Kg / Liter)</label>
                            <input type="number" id="input-jumlah" class="form-control" style="padding-left: 14px;" placeholder="Contoh: 1500" min="1" required>
                        </div>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core App Logic -->
    <script src="assets/js/app.js"></script>
    <!-- Distribusi controller -->
    <script src="assets/js/distribusi.js"></script>
</body>
</html>
